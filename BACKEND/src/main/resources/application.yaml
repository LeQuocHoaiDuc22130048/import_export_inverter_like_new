spring:
  application:
    name: ims-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ims_db}
    username: ${DB_USER:ims_user}
    password: ${DB_PASSWORD:ims_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms

  jackson:
    serialization:
      write-dates-as-timestamps: false   # Instant → ISO-8601 string, không phải số
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:XBaT8nr/RJsy359hdDc5B/PThvb9Nt7d5tb80ZZKA/s=}
  access-token-expiration: 900000       # 15 phút (ms)
  refresh-token-expiration: 604800000   # 7 ngày (ms)

# App Configuration
app:
  # ── Tài khoản mặc định khởi tạo khi startup ──────────────────────────
  # ⚠️ Override bằng biến môi trường trong production!
  init:
    super-admin:
      username: ${SUPER_ADMIN_USERNAME:superadmin}
      email: ${SUPER_ADMIN_EMAIL:superadmin@company.com}
      password: ${SUPER_ADMIN_PASSWORD:Admin@123456}   # BẮT BUỘC đổi khi deploy
      full-name: ${SUPER_ADMIN_FULL_NAME:Super Administrator}
    admin:
      username: ${ADMIN_USERNAME:}                     # Để trống nếu không cần
      email: ${ADMIN_EMAIL:}
      password: ${ADMIN_PASSWORD:}
      full-name: ${ADMIN_FULL_NAME:Administrator}

  face-service-url: ${FACE_SERVICE_URL:http://localhost:8001}
#  minio:
#    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
#    access-key: ${MINIO_ACCESS_KEY:minioadmin}
#    secret-key: ${MINIO_SECRET_KEY:minioadmin}
#    bucket-name: ${MINIO_BUCKET:ims-files}
  board:
    overdue-hours: 48
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:8080}

  flyway:
    repair-on-startup: ${FLYWAY_REPAIR_ON_STARTUP:false}

# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

# Logging
logging:
  level:
    com.company.ims: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{correlationId}] %logger{36} - %msg%n"