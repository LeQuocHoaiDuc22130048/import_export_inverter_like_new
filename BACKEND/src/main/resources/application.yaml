spring:
  application:
    name: system-internal-inl-backend

    # 1. DATABASE CONFIGURATION (PostgreSQL in Docker)
  datasource:
    url: jdbc:postgresql://localhost:5432/system_internal_inl?options=-c+timezone%3DAsia%2FHo_Chi_Minh
    username: admin
    password: admin@123
    driver-class-name: org.postgresql.Driver

    # 2. JPA / HIBERNATE CONFIGURATION
  jpa:
    hibernate:
        # Tự động cập nhật cấu trúc bảng dựa trên Entity (Phù hợp giai đoạn Dev)
      ddl-auto: create
    show-sql: true # Hiển thị câu lệnh SQL trong Console để dễ debug
    properties:
      hibernate:
        jdbc:
          timezone: Asia/Ho_Chi_Minh
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 4. REDIS CONFIGURATION (Dùng cho blacklist JWT token)
  data:
    redis:
      host: localhost
      port: 6379

  # 5. FILE UPLOAD (Cho Face ID photo hoặc ảnh linh kiện)
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  # 4. SERVER CONFIGURATION
server:
  port: 8888
  error:
    include-message: always # Hiển thị lỗi chi tiết để Flutter dễ xử lý

  # 5. LOGGING CONFIGURATION (Tuân thủ RULES.md)
logging:
  level:
    root: INFO
    com.smartwms: DEBUG # Log chi tiết logic của dự án
    org.hibernate.SQL: DEBUG

  # 6. CUSTOM APP PROPERTIES (Cấu hình JWT)
app:
  init:
    boss:
      username: ${BOSS_USER}
      password: ${BOSS_PASS}
      full-name: "Đỗ Xuân Vỹ"
    admin:
      username: ${ADMIN_USER}
      password: ${ADMIN_PASS}
      full-name: "Admin System"
  jwt:
    secret: 49bd017fed0abe7d529c48151ca5c6b5c231610d6b1560c53e50bf48682e5ba6
    expiration-ms: 604800000
